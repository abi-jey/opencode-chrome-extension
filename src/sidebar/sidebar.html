<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenCode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; font-size: 13px; color: #e0e0e0; background: #1a1a2e; padding: 12px; }
    h2 { font-size: 14px; margin-bottom: 8px; color: #fff; }
    .status { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
    .dot.connected { background: #4caf50; }
    .section { margin-bottom: 16px; }
    .section h3 { font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .tab-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; background: #16213e; border-radius: 4px; margin-bottom: 4px; }
    .tab-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
    .tab-item .url { font-size: 11px; color: #888; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toggle { width: 32px; height: 18px; background: #444; border-radius: 9px; position: relative; cursor: pointer; border: none; flex-shrink: 0; }
    .toggle.on { background: #4caf50; }
    .toggle::after { content: ''; position: absolute; width: 14px; height: 14px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.1s; }
    .toggle.on::after { transform: translateX(14px); }
    button { padding: 4px 10px; border: 1px solid #444; border-radius: 4px; background: #16213e; color: #e0e0e0; cursor: pointer; font-size: 12px; }
    button:hover { background: #0f3460; }
    .refresh { width: 100%; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>OpenCode Browser</h2>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Disconnected</span>
  </div>
  <div class="section">
    <h3>Tabs</h3>
    <div id="tabList">Loading...</div>
    <button class="refresh" id="refreshBtn">Refresh Tabs</button>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
